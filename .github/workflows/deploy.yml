name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/cuucuu-deepface || git clone git@github.com:altyaper/cuucuu-deepface.git ~/cuucuu-deepface && cd ~/cuucuu-deepface
            git pull origin main
            # Remove any legacy container from the old `docker run` deploy so it doesn't conflict on port 8100
            docker stop cuucuu-deepface || true
            docker rm cuucuu-deepface || true
            docker compose up -d --build
