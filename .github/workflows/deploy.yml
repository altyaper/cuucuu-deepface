name: Deploy to Digital Ocean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/cuucuu-deepface || git clone git@github.com:altyaper/cuucuu-deepface.git ~/cuucuu-deepface && cd ~/cuucuu-deepface
            git pull origin main
            docker build -t cuucuu-deepface .
            docker stop cuucuu-deepface || true
            docker rm cuucuu-deepface || true
            docker run -d --name cuucuu-deepface --restart unless-stopped -p 8100:8100 cuucuu-deepface
